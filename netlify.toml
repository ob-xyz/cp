[build]
  command = "remix build"
  publish = "public"

[dev]
  command = "remix watch"
  port = 3000
  
[[redirects]]
  from = "/today"
  to = "https://app.canadapoast.com/campaign/ba97f2f9-a8c7-46a7-b183-ccffbc3b6891/e0b14610-4448-4657-ae89-21598fe78de2"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

[[headers]]
  for = "/build/*"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, s-maxage=31536000"
